<section id="history">
  <app-admin-add-button
    wrapperClass="history-add"
    [items]="addItems"
    (itemClick)="onAddItemClick($event)"></app-admin-add-button>
  <div class="section-header">
    <div class="section-label">{{ 'history.label' | t }}</div>
    <h2>{{ 'history.title' | t }}</h2>
    <p>{{ 'history.intro' | t }}</p>
  </div>

  <div class="facts-grid">
    @for (fact of facts(); track fact.id) {
      <div class="fact-card" (click)="factClick()">
        <div class="fact-year">{{ fact.date }}</div>
        <h4>{{ fact.title }}</h4>
        <p>{{ fact.description }}</p>
      </div>
    }
  </div>
</section>
