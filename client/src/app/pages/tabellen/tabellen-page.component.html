<div class="tabellen-page" [class.open]="overlay.tabellenOpen()" role="dialog" aria-label="TIME-ZONE Tabellen">
  <button class="tabellen-back" type="button" (click)="close()">
    <span class="back-arrow" aria-hidden="true">←</span> Zurück
  </button>
  <div class="samuel-easter-egg" [class.show]="samuelShown()" [attr.aria-hidden]="!samuelShown()">
    <div class="heart-wrapper">
      <svg class="heart-shape" viewBox="0 0 100 100" aria-hidden="true">
        <defs>
          <linearGradient id="samuelHeartGrad" x1="0" y1="0" x2="0" y2="1">
            <stop offset="0%" stop-color="#ff6478"/>
            <stop offset="50%" stop-color="#ff2a4a"/>
            <stop offset="100%" stop-color="#a00a22"/>
          </linearGradient>
        </defs>
        <path d="M 50 88 C 50 88 10 60 10 36 C 10 21 21 12 33 12 C 42 12 48 17 50 24 C 52 17 58 12 67 12 C 79 12 90 21 90 36 C 90 60 50 88 50 88 Z"
              fill="url(#samuelHeartGrad)" stroke="#5a0a18" stroke-width="2.5"/>
      </svg>
      <svg class="mc-creeper" viewBox="0 0 32 32" aria-hidden="true">
        <rect width="32" height="32" fill="#5e9c3e"/>
        <rect x="4" y="4" width="8" height="8" fill="#000"/>
        <rect x="20" y="4" width="8" height="8" fill="#000"/>
        <rect x="12" y="12" width="8" height="4" fill="#000"/>
        <rect x="8" y="16" width="16" height="4" fill="#000"/>
        <rect x="8" y="20" width="4" height="8" fill="#000"/>
        <rect x="20" y="20" width="4" height="8" fill="#000"/>
      </svg>
    </div>
  </div>

  <div class="tabellen-content">
    <div class="tabellen-search-wrap">
      <input
        type="text"
        class="tabellen-search"
        placeholder="🔍  Search"
        autocomplete="off"
        [ngModel]="searchValue()"
        (ngModelChange)="searchValue.set($event)"
        (keydown)="onSearchKeydown($event)"
        name="tabellenSearch">
      <button type="button" class="search-enter-btn" (click)="onEnterClick()">
        <span>Enter</span>
        <span class="enter-arrow" aria-hidden="true">↵</span>
      </button>
    </div>

    <div class="chart-container" [class.hidden]="chartHidden()" [attr.data-tick]="animateTick()">
      <div class="chart-title">Beliebtheit von TIME-ZONE</div>
      <div class="chart-subtitle">2020 – 2026</div>
      <svg class="popularity-chart" viewBox="0 0 720 360" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Beliebtheit von TIME-ZONE 2020 bis 2026">
        <defs>
          <linearGradient id="chartAreaGrad" x1="0" y1="0" x2="0" y2="1">
            <stop offset="0%" stop-color="#4d8bff" stop-opacity="0.45"/>
            <stop offset="100%" stop-color="#4d8bff" stop-opacity="0"/>
          </linearGradient>
          <linearGradient id="chartLineGrad" x1="0" y1="0" x2="1" y2="0">
            <stop offset="0%" stop-color="#0057ff"/>
            <stop offset="100%" stop-color="#4d8bff"/>
          </linearGradient>
        </defs>

        <g class="chart-grid">
          <line x1="60" y1="20" x2="690" y2="20"/>
          <line x1="60" y1="92" x2="690" y2="92"/>
          <line x1="60" y1="165" x2="690" y2="165"/>
          <line x1="60" y1="237" x2="690" y2="237"/>
          <line x1="60" y1="310" x2="690" y2="310"/>
        </g>

        <g class="chart-y-labels">
          <text x="50" y="24" text-anchor="end">100</text>
          <text x="50" y="96" text-anchor="end">75</text>
          <text x="50" y="169" text-anchor="end">50</text>
          <text x="50" y="241" text-anchor="end">25</text>
          <text x="50" y="314" text-anchor="end">0</text>
        </g>

        <g class="chart-x-labels">
          <text x="60" y="335" text-anchor="middle">2020</text>
          <text x="165" y="335" text-anchor="middle">2021</text>
          <text x="270" y="335" text-anchor="middle">2022</text>
          <text x="375" y="335" text-anchor="middle">2023</text>
          <text x="480" y="335" text-anchor="middle">2024</text>
          <text x="585" y="335" text-anchor="middle">2025</text>
          <text x="690" y="335" text-anchor="middle">2026</text>
        </g>

        <path class="chart-area animate" d="M 60 287 L 165 261 L 270 223 L 375 174 L 480 124 L 585 75 L 690 35 L 690 310 L 60 310 Z" fill="url(#chartAreaGrad)"/>

        <path class="chart-line animate" pathLength="100" d="M 60 287 L 165 261 L 270 223 L 375 174 L 480 124 L 585 75 L 690 35" fill="none" stroke="url(#chartLineGrad)" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/>

        <g class="chart-dots animate">
          <circle cx="60" cy="287" r="5" style="--i:0"/>
          <circle cx="165" cy="261" r="5" style="--i:1"/>
          <circle cx="270" cy="223" r="5" style="--i:2"/>
          <circle cx="375" cy="174" r="5" style="--i:3"/>
          <circle cx="480" cy="124" r="5" style="--i:4"/>
          <circle cx="585" cy="75" r="5" style="--i:5"/>
          <circle cx="690" cy="35" r="5" style="--i:6"/>
        </g>
      </svg>
      <div class="chart-legend">
        <span class="legend-dot" aria-hidden="true"></span>
        <span>Beliebtheits-Score (0 – 100)</span>
      </div>
    </div>
  </div>
</div>
