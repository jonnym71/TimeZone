<div class="lock-toast" [class.show]="toast.visible()" role="alert" aria-live="polite">
  <span class="lock-toast-icon" aria-hidden="true">🔒</span>
  <span class="lock-toast-msg">{{ 'lock.message' | t }}</span>
  <button class="lock-toast-btn" type="button" (click)="openLogin()">{{ 'lock.signin' | t }}</button>
</div>
