<div class="cookie-banner" [class.hidden]="cookies.acknowledged()" role="region" aria-label="Datenschutz-Hinweis">
  <p>
    <span [innerHTML]="'cookie.text' | t"></span>
    <a routerLink="/datenschutz">{{ 'cookie.privacyLink' | t }}</a>.
  </p>
  <button class="cookie-accept" type="button" (click)="accept()">{{ 'cookie.accept' | t }}</button>
</div>
